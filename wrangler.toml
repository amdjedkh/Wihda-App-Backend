name = "wihda-backend"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

account_id = "b725524f83e2be19d8b2e26f4bed5239"

[dev]
port = 8787
local_protocol = "http"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "wihda-db"
database_id = "b5e14395-6fa1-4733-b28c-cb64c4aeb540"

# KV Namespace
[[kv_namespaces]]
binding = "KV"
id = "0b220ac5131b4db589b0bff10e02dd23"

# R2 Storage — enable R2 in Cloudflare dashboard first, then uncomment
# [[r2_buckets]]
# binding = "STORAGE"
# bucket_name = "wihda-uploads"

# Durable Objects for Chat
[[durable_objects.bindings]]
name = "CHAT_DO"
class_name = "ChatThreadDurableObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChatThreadDurableObject"]

# Cloudflare Workers AI
[ai]
binding = "AI"

# Cron triggers
[triggers]
crons = ["0 */12 * * *"]

[vars]
ENVIRONMENT = "production"
RESEND_FROM_EMAIL = "Wihda <noreply@wihdaapp.com>"
FRONTEND_URL = "https://app.wihdaapp.com"
API_URL = "https://api.wihdaapp.com"
